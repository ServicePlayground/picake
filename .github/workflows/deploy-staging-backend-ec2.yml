name: Deploy Picake Backend to EC2 (Staging)

permissions:
  contents: read

on:
  push:
    tags:
      - "backend/staging-*"

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare source code package
        run: |
          # ⚠️ 불필요한 파일 제외하고 압축
          mkdir -p /tmp/deploy
          tar -czf /tmp/deploy/deploy.tar.gz \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.yarn/cache \
            --exclude=.next \
            --exclude=dist \
            --exclude=apps/web-user \
            --exclude=apps/web-seller \
            --exclude=apps/web-admin \
            .
          mv /tmp/deploy/deploy.tar.gz .

      - name: Copy deployment package to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "~/"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          script: |
            set -e

            # 롤백 함수 정의
            rollback_deployment() {
              echo ""
              echo "🔄 배포 실패로 인한 롤백 시작..."

              # PM2 프로세스 중지 (이미 실패한 새 버전이 실행 중일 수 있음)
              pm2 delete picake-backend-staging 2>/dev/null || true

              # 가장 최근 백업 찾기
              LATEST_BACKUP=$(ls -td ~/picake.backup.* 2>/dev/null | head -1)

              if [ -n "$LATEST_BACKUP" ] && [ -d "$LATEST_BACKUP" ]; then
                echo "📦 백업 복원 중: $LATEST_BACKUP"
                rm -rf ~/picake
                mv "$LATEST_BACKUP" ~/picake

                # 이전 버전으로 PM2 재시작
                if [ -f ~/picake/apps/backend/dist/main.js ]; then
                  cd ~/picake/apps/backend
                  NODE_ENV=staging pm2 start dist/main.js \
                    --name picake-backend-staging \
                    --update-env \
                    --cwd $(pwd)
                  pm2 save
                  echo "✅ 롤백 완료 - 이전 버전으로 복구되었습니다"
                else
                  echo "⚠️ 롤백 실패 - 백업에 빌드 파일이 없습니다"
                fi
              else
                echo "❌ 롤백 실패 - 백업을 찾을 수 없습니다"
              fi

              exit 1
            }

            # 백업 파일 개수 제한 함수 (디스크 사용량에 따라 동적 조정)
            cleanup_old_backups() {
              local BACKUP_TYPE=$1
              local BACKUP_PATTERN=$2
              local USE_PERCENT=$3
              local KEEP_COUNT=5

              # 디스크 사용량에 따라 백업 개수 조정
              if [ "$USE_PERCENT" -ge 90 ]; then
                KEEP_COUNT=2
                echo "⚠️ 디스크 사용량이 높아 백업을 최근 ${KEEP_COUNT}개만 유지합니다"
              elif [ "$USE_PERCENT" -ge 85 ]; then
                KEEP_COUNT=3
                echo "⚠️ 디스크 사용량이 높아 백업을 최근 ${KEEP_COUNT}개만 유지합니다"
              fi

              echo "🧹 오래된 ${BACKUP_TYPE} 백업 정리 중 (최근 ${KEEP_COUNT}개만 유지)..."

              # 타임스탬프 기준으로 정렬하여 오래된 것부터 삭제
              ls -t ${BACKUP_PATTERN} 2>/dev/null | tail -n +$((KEEP_COUNT + 1)) | while read -r old_backup; do
                echo "  삭제: $old_backup"
                rm -rf "$old_backup"
              done || true
            }

            echo "📊 디스크 사용량 체크"
            USE_PERCENT=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
            echo "현재 디스크 사용량: ${USE_PERCENT}%"

            # 오래된 백업 파일 정리 (항상 실행, 디스크 사용량에 따라 유지 개수만 조정)
            echo "🗑️ 오래된 백업 파일 정리 중..."
            cleanup_old_backups "서버" "~/picake.backup.*" "$USE_PERCENT"
            cleanup_old_backups "DB" "~/db-backup.*.sql.gz" "$USE_PERCENT"
            cleanup_old_backups "DB" "~/db-backup.*.dump" "$USE_PERCENT"

            # 디스크 사용량이 80% 이상이면 추가 정리 작업 수행
            if [ "$USE_PERCENT" -gt 80 ]; then
              echo "⚠️ 디스크 사용량이 ${USE_PERCENT}%로 높습니다. 추가 정리 작업을 시작합니다..."
              if [ "$USE_PERCENT" -ge 85 ]; then
                echo "📢 주의: 디스크 사용량이 지속적으로 높다면 EC2 루트 볼륨 확장 또는 배포 로직 개선을 고려하세요"
              fi

              # 기존 프로젝트의 node_modules 삭제 (dist는 롤백 시 PM2 기동에 필요하므로 유지)
              if [ -d ~/picake ]; then
                echo "🗑️ 기존 프로젝트의 node_modules 디렉토리 삭제 중..."
                find ~/picake -type d -name "node_modules" -exec rm -rf {} + 2>/dev/null || true
                find ~/picake -type d -name ".next" -exec rm -rf {} + 2>/dev/null || true
                find ~/picake -type d -name ".yarn" -exec rm -rf {} + 2>/dev/null || true
              fi

              # Yarn 캐시 정리
              echo "🗑️ Yarn 캐시 정리 중..."
              yarn cache clean --all 2>/dev/null || true
              rm -rf ~/.cache ~/.yarn/cache ~/.yarn/berry/cache

              # PM2 로그 정리
              echo "🗑️ PM2 로그 정리 중..."
              pm2 flush || true

              # 시스템 패키지 캐시 정리
              echo "🗑️ 시스템 패키지 캐시 정리 중..."
              sudo dnf clean all 2>/dev/null || true

              # 임시 파일 정리
              echo "🗑️ 임시 파일 정리 중..."
              sudo rm -rf /tmp/* 2>/dev/null || true
              rm -rf ~/tmp/* 2>/dev/null || true

              # 정리 후 디스크 사용량 재확인
              USE_PERCENT=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
              echo "정리 후 디스크 사용량: ${USE_PERCENT}%"

              # 여전히 95% 이상이면 배포 중단
              if [ "$USE_PERCENT" -gt 95 ]; then
                echo "❌ 디스크 사용량 ${USE_PERCENT}% — 정리 후에도 공간 부족. 배포 중단"
                exit 1
              fi
            fi

            # 🗄️ DB 백업 생성 (배포 전)
            echo "🗄️ 데이터베이스 백업 생성 중..."
            DB_BACKUP_NAME=~/db-backup.$(date +%Y%m%d_%H%M%S).sql.gz
            PGPASSWORD='${{ secrets.STAGING_DATABASE_PASSWORD }}' \
              pg_dump -h localhost -p 5432 -U picake_admin \
              -d picake_staging_db \
              -F c -f "${DB_BACKUP_NAME%.gz}" 2>/dev/null || {
              echo "⚠️ DB 백업 실패 (계속 진행합니다)"
              rm -f "${DB_BACKUP_NAME%.gz}"
            }

            # 압축 (백업이 성공한 경우만)
            if [ -f "${DB_BACKUP_NAME%.gz}" ]; then
              gzip "${DB_BACKUP_NAME%.gz}"
              echo "✅ DB 백업 완료: $DB_BACKUP_NAME"
            fi

            # 기존 프로젝트 백업 (타임스탬프 포함)
            # 백업 전에 node_modules만 삭제 (dist는 롤백 시 이전 빌드로 서비스 복구에 필요)
            CURRENT_BACKUP_NAME=""
            if [ -d ~/picake ]; then
              echo "🗑️ 백업 전 불필요한 파일 정리 중 (node_modules 등)..."
              find ~/picake -type d -name "node_modules" -exec rm -rf {} + 2>/dev/null || true
              find ~/picake -type d -name ".next" -exec rm -rf {} + 2>/dev/null || true
              find ~/picake -type d -name ".yarn" -exec rm -rf {} + 2>/dev/null || true
              find ~/picake -type f -name "*.log" -delete 2>/dev/null || true

              CURRENT_BACKUP_NAME=~/picake.backup.$(date +%Y%m%d_%H%M%S)
              echo "📦 기존 프로젝트 백업 중: $CURRENT_BACKUP_NAME"
              mv ~/picake "$CURRENT_BACKUP_NAME" || {
                echo "⚠️ 백업 실패, 기존 디렉토리 삭제 후 진행"
                rm -rf ~/picake
              }
            fi

            # 배포 실패 시 롤백을 위한 trap 설정
            trap rollback_deployment ERR

            mkdir -p ~/picake
            cd ~/picake

            echo "📂 압축 해제"
            tar -xzf ~/deploy.tar.gz
            rm ~/deploy.tar.gz

            # 기존 node_modules 정리 (혹시 남아있을 수 있음)
            echo "🗑️ 기존 node_modules 정리 중..."
            find ~/picake -type d -name "node_modules" -exec rm -rf {} + 2>/dev/null || true

            # ✅ [FIX] ~/.yarn/berry/cache 삭제 제거
            # 매번 삭제하면 수백 개 패키지를 처음부터 다시 받아야 하고,
            # 다운로드 중 hang이 발생해도 yarn에 기본 타임아웃이 없어 무한 대기함.
            # 캐시를 유지하면 다음 배포부터 이미 받은 패키지는 재사용되어 빠름.
            # (디스크 80% 초과 시 위 블록에서 이미 정리됨)

            # yarn 버전 확인 (서버 초기 설정 시 이미 corepack으로 설치됨)
            yarn --version

            # 디스크 공간 확인 후 의존성 설치
            USE_PERCENT=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
            echo "의존성 설치 전 디스크 사용량: ${USE_PERCENT}%"

            if [ "$USE_PERCENT" -gt 90 ]; then
              echo "⚠️ 디스크 사용량이 ${USE_PERCENT}%로 높습니다. 추가 정리 중..."
              cleanup_old_backups "서버" "~/picake.backup.*" "$USE_PERCENT"
              cleanup_old_backups "DB" "~/db-backup.*.sql.gz" "$USE_PERCENT"
              cleanup_old_backups "DB" "~/db-backup.*.dump" "$USE_PERCENT"
              USE_PERCENT=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
              echo "추가 정리 후 디스크 사용량: ${USE_PERCENT}%"
            fi

            echo "📦 의존성 설치"
            # ✅ [FIX] yarn install → yarn workspaces focus @picake/backend
            # - backend 의존성만 설치 (web-user, web-seller, web-admin 패키지 제외)
            # - YARN_HTTP_TIMEOUT: 패키지 다운로드가 60초 이상 응답 없으면 hang 대신 에러 처리
            #   (yarn workspaces focus는 --network-timeout 플래그 미지원, 환경변수로 설정)
            YARN_HTTP_TIMEOUT=60000 yarn workspaces focus @picake/backend || {
              echo "❌ 의존성 설치 실패"
              rollback_deployment
            }

            echo "⚙️ 환경 변수 파일 생성 중..."
            cat > apps/backend/.env.staging << EOF
            # Environment
            NODE_ENV=staging

            # PORT - staging
            PORT=8080

            # DOMAIN - staging
            PUBLIC_USER_DOMAIN=https://staging.picakes.com
            PUBLIC_SELLER_DOMAIN=https://seller-staging.picakes.com
            PUBLIC_ADMIN_DOMAIN=https://admin-staging.picakes.com

            # CORS Configuration - staging
            CORS_ORIGIN=https://staging.picakes.com,https://seller-staging.picakes.com,https://admin-staging.picakes.com

            # JWT - staging
            JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}

            # DATABASE - staging
            # 옵션 1: EC2 PostgreSQL 사용 (비용 절감)
            DATABASE_URL=postgresql://picake_admin:${{ secrets.STAGING_DATABASE_PASSWORD }}@localhost:5432/picake_staging_db?schema=public

            # SWAGGER - development & staging
            SWAGGER_USERNAME=${{ secrets.SWAGGER_USERNAME }}
            SWAGGER_PASSWORD=${{ secrets.SWAGGER_PASSWORD }}

            # GOOGLE OAuth (Consumer) - staging
            GOOGLE_CLIENT_ID=${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.STAGING_GOOGLE_CLIENT_SECRET }}
            # GOOGLE OAuth (Seller) - staging
            GOOGLE_CLIENT_ID_SELLER=${{ secrets.STAGING_GOOGLE_CLIENT_ID_SELLER }}
            GOOGLE_CLIENT_SECRET_SELLER=${{ secrets.STAGING_GOOGLE_CLIENT_SECRET_SELLER }}

            # KAKAO (Consumer) - development & staging & production (공용)
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            # KAKAO (Seller) - development & staging & production (공용)
            KAKAO_CLIENT_ID_SELLER=${{ secrets.KAKAO_CLIENT_ID_SELLER }}
            KAKAO_CLIENT_SECRET_SELLER=${{ secrets.KAKAO_CLIENT_SECRET_SELLER }}

            # FIREBASE Admin SDK - development & staging & production (공용)
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}

            # AWS - development & staging & production (공용)
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=ap-northeast-2
            # AWS S3 Bucket - development & staging (공용)
            S3_BUCKET=${{ secrets.STAGING_S3_BUCKET }}
            CLOUDFRONT_DOMAIN=${{ secrets.STAGING_CLOUDFRONT_DOMAIN }}

            # DATA_GO_KR_API_KEY - development & staging & production (공용)
            DATA_GO_KR_API_KEY=${{ secrets.DATA_GO_KR_API_KEY }}

            # Sentry - staging
            SENTRY_DSN=${{ secrets.STAGING_SENTRY_DSN }}

            # SOLAPI (SMS 인증 · 카카오 알림톡) - staging & production (공용)
            SOLAPI_API_KEY=${{ secrets.SOLAPI_API_KEY }}
            SOLAPI_API_SECRET=${{ secrets.SOLAPI_API_SECRET }}
            SOLAPI_SENDER_PHONE=${{ secrets.SOLAPI_SENDER_PHONE }}
            SOLAPI_PFID=${{ secrets.SOLAPI_PFID }}

            # SERVICE MAINTENANCE MODE (GitHub Secret: STAGING_SERVICE_MAINTENANCE_MODE)
            # true 로 설정하면 모든 API·WebSocket 요청을 차단합니다. 미설정 시 false.
            SERVICE_MAINTENANCE_MODE=${{ secrets.STAGING_SERVICE_MAINTENANCE_MODE }}
            EOF

            # 환경 변수 파일 권한 설정
            chmod 600 apps/backend/.env.staging

            echo "🗄️ Prisma migrate"
            cd apps/backend
            # DATABASE_URL을 안전하게 읽어서 export (주석 제외, 첫 번째 매칭만)
            DATABASE_URL=$(grep '^DATABASE_URL=' .env.staging | head -1 | cut -d '=' -f2- | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            export DATABASE_URL
            echo "DATABASE_URL 설정 완료"

            # 실패한 마이그레이션 사전 확인 및 해결
            echo "🔍 마이그레이션 상태 확인 중..."
            MIGRATE_STATUS=$(npx prisma migrate status --schema ./src/infra/database/prisma/schema.prisma 2>&1 || true)

            if echo "$MIGRATE_STATUS" | grep -q "failed\|P3009"; then
              echo "⚠️ 실패한 마이그레이션 감지. 롤백 상태로 표시 중..."
              # 실패한 마이그레이션 이름 추출 (일반적으로 가장 최근 실패한 것)
              FAILED_MIGRATION=$(echo "$MIGRATE_STATUS" | grep -oP '^\s*\K[0-9_]+' | head -1 || echo "20260204214916_202602050649")

              if [ -n "$FAILED_MIGRATION" ]; then
                echo "🔧 마이그레이션 '$FAILED_MIGRATION'을 롤백 상태로 표시 중..."
                npx prisma migrate resolve --rolled-back "$FAILED_MIGRATION" --schema ./src/infra/database/prisma/schema.prisma 2>/dev/null || true
                echo "✅ 실패한 마이그레이션 해결 완료"
              fi
            fi

            # Prisma migrate 실행
            MIGRATE_SUCCESS=false
            if ! npx prisma migrate deploy --schema ./src/infra/database/prisma/schema.prisma 2>&1 | tee /tmp/migrate_output.log; then
              MIGRATE_OUTPUT=$(cat /tmp/migrate_output.log)

              # P3009 오류: 실패한 마이그레이션이 있는 경우
              if echo "$MIGRATE_OUTPUT" | grep -q "P3009\|failed migrations"; then
                echo "⚠️ 실패한 마이그레이션 감지. 롤백 상태로 표시 후 재시도..."

                # 실패한 마이그레이션 이름 추출
                FAILED_MIGRATION=$(echo "$MIGRATE_OUTPUT" | grep -oP 'The `\K[^`]+' | head -1 || echo "20260204214916_202602050649")

                if [ -n "$FAILED_MIGRATION" ]; then
                  echo "🔧 마이그레이션 '$FAILED_MIGRATION'을 롤백 상태로 표시 중..."
                  npx prisma migrate resolve --rolled-back "$FAILED_MIGRATION" --schema ./src/infra/database/prisma/schema.prisma 2>/dev/null || true

                  echo "🔄 마이그레이션 재시도 중..."
                  if npx prisma migrate deploy --schema ./src/infra/database/prisma/schema.prisma; then
                    echo "✅ Prisma migrate 성공 (재시도 후)"
                    MIGRATE_SUCCESS=true
                  else
                    echo "❌ Prisma migrate 재시도 실패"
                    rollback_deployment
                  fi
                else
                  echo "❌ 실패한 마이그레이션 이름을 찾을 수 없습니다"
                  rollback_deployment
                fi
              else
                echo "❌ Prisma migrate 실패"
                echo ""
                echo "⚠️ PostgreSQL 인증 설정이 필요할 수 있습니다."
                echo "📖 EC2 서버에 SSH 접속하여 다음을 확인하세요:"
                echo ""
                echo "1. pg_hba.conf 파일 수정:"
                echo "   sudo nano /var/lib/pgsql/data/pg_hba.conf"
                echo "   'host all all 127.0.0.1/32 ident' → 'host all all 127.0.0.1/32 md5'로 변경"
                echo ""
                echo "2. PostgreSQL 재시작:"
                echo "   sudo systemctl restart postgresql"
                echo ""
                echo "3. 자세한 내용은 docs/infra/aws/EC2_Route53_S3_CloudFront.md 3.3단계를 참고하세요."
                echo ""
                rollback_deployment
              fi
            else
              echo "✅ Prisma migrate 성공"
              MIGRATE_SUCCESS=true
            fi

            # Prisma Client 재생성 (마이그레이션 성공 시에만)
            if [ "$MIGRATE_SUCCESS" = true ]; then
              echo "🔄 Prisma Client 재생성 중..."
              npx prisma generate --schema ./src/infra/database/prisma/schema.prisma || {
                echo "⚠️ Prisma Client 재생성 실패 (계속 진행합니다)"
              }

              # Staging 배포 시 자동 시드는 비활성화 (실데이터/스테이징 정책 보호). 필요 시 서버에서 수동: yarn db:seed:staging
              # echo "🌱 Staging 데이터베이스 시드 실행 (idempotent)"
              # yarn db:seed:staging || {
              #   echo "❌ Staging 시드 실행 실패"
              #   rollback_deployment
              # }
            fi

            cd ~/picake

            echo "🔨 Backend build"
            yarn run backend:build || {
              echo "❌ 빌드 실패"
              rollback_deployment
            }

            echo "🚀 PM2 restart"
            pm2 delete picake-backend-staging || true
            cd apps/backend
            NODE_ENV=staging pm2 start dist/main.js \
              --name picake-backend-staging \
              --update-env \
              --cwd $(pwd) || {
              echo "❌ PM2 시작 실패"
              rollback_deployment
            }
            pm2 save

            # 배포 성공 시 trap 해제
            trap - ERR

            echo "✅ 배포 완료!"
            pm2 list

            # SSL 인증서 상태 로그 (EC2 로컬, 배포 성공 후)
            echo ""
            echo "🔒 SSL 인증서 상태 (EC2)"
            API_HOST="api-staging.picakes.com"
            CERT_FILE="/etc/letsencrypt/live/${API_HOST}/fullchain.pem"
            if sudo test -f "$CERT_FILE"; then
              NOT_AFTER=$(sudo openssl x509 -in "$CERT_FILE" -noout -enddate 2>/dev/null | cut -d= -f2)
              EXPIRY_EPOCH=$(date -d "$NOT_AFTER" +%s 2>/dev/null || echo 0)
              NOW_EPOCH=$(date +%s)
              DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
              echo "  도메인: ${API_HOST}"
              echo "  인증서: ${CERT_FILE}"
              echo "  만료일: ${NOT_AFTER}"
              echo "  남은 일수: ${DAYS_LEFT}일"
              if [ "$DAYS_LEFT" -lt 0 ]; then
                echo "❌ SSL 인증서 만료됨 — 프론트 Network Error 원인 가능"
                echo "   조치: sudo certbot renew --nginx && sudo nginx -t && sudo systemctl reload nginx"
              elif [ "$DAYS_LEFT" -le 14 ]; then
                echo "⚠️ SSL 인증서 ${DAYS_LEFT}일 후 만료 예정 — 갱신 권장"
              else
                echo "✅ SSL 인증서 유효"
              fi
            else
              echo "⚠️ Let's Encrypt 인증서 없음: ${CERT_FILE}"
            fi
            if command -v certbot >/dev/null 2>&1; then
              echo ""
              echo "  [certbot certificates]"
              sudo certbot certificates 2>/dev/null | grep -E "Certificate Name|Domains|Expiry Date" || true
            fi

            echo ""
            echo "🏥 백엔드 헬스체크 (localhost, PM2 기동 대기 포함)"
            HEALTH_OK=false
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/health >/tmp/local-health.json 2>/dev/null; then
                echo "✅ localhost:8080 /health 정상 (${i}회째 시도)"
                cat /tmp/local-health.json
                echo ""
                HEALTH_OK=true
                break
              fi
              echo "  시도 ${i}/30: 아직 기동 중... 2초 후 재시도"
              sleep 2
            done
            if [ "$HEALTH_OK" != true ]; then
              echo "⚠️ localhost:8080 /health 실패 (60초 대기 후) — PM2 로그 확인: pm2 logs picake-backend-staging --lines 30"
            fi

            # 배포 성공 후 오래된 백업 정리 (디스크 사용량에 따라 동적 조정)
            USE_PERCENT=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
            cleanup_old_backups "서버" "~/picake.backup.*" "$USE_PERCENT"
            cleanup_old_backups "DB" "~/db-backup.*.sql.gz" "$USE_PERCENT"
            cleanup_old_backups "DB" "~/db-backup.*.dump" "$USE_PERCENT"

      - name: Verify SSL certificate and HTTPS health
        if: success()
        run: |
          set -euo pipefail
          HOST="api-staging.picakes.com"
          WARN_DAYS=14

          echo "🔒 SSL 인증서 검증 (외부): https://${HOST}"
          echo "=============================================="

          EXPIRY=$(echo | openssl s_client -connect "${HOST}:443" -servername "$HOST" 2>/dev/null \
            | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2 || true)

          if [ -z "$EXPIRY" ]; then
            echo "::error title=SSL check failed::${HOST} 인증서 정보를 가져올 수 없습니다."
            exit 1
          fi

          EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

          echo "  도메인: ${HOST}"
          echo "  만료일: ${EXPIRY}"
          echo "  남은 일수: ${DAYS_LEFT}일"

          if [ "$DAYS_LEFT" -lt 0 ]; then
            echo "::error title=SSL certificate expired::${HOST} SSL 인증서가 만료되었습니다 (${DAYS_LEFT}일 경과)."
            echo "  EC2 SSH 후: sudo certbot renew --nginx && sudo nginx -t && sudo systemctl reload nginx"
            exit 1
          elif [ "$DAYS_LEFT" -le "$WARN_DAYS" ]; then
            echo "::warning title=SSL certificate expiring soon::${HOST} SSL 인증서가 ${DAYS_LEFT}일 후 만료됩니다."
          else
            echo "✅ SSL 인증서 유효 (${DAYS_LEFT}일 남음)"
          fi

          echo ""
          echo "🏥 HTTPS /health 검증 (백엔드 기동 대기 포함, 최대 60초)"
          HEALTH_URL="https://${HOST}/health"
          HEALTH_OK=false
          LAST_CODE="000"
          for i in $(seq 1 30); do
            LAST_CODE=$(curl -sS -o /tmp/staging-health.json -w "%{http_code}" \
              --connect-timeout 10 "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$LAST_CODE" = "200" ]; then
              echo "✅ ${HEALTH_URL} → HTTP 200 (${i}회째 시도)"
              cat /tmp/staging-health.json
              echo ""
              HEALTH_OK=true
              break
            fi
            echo "  시도 ${i}/30: HTTP ${LAST_CODE} — 2초 후 재시도 (PM2/NestJS 기동 중일 수 있음)"
            sleep 2
          done
          if [ "$HEALTH_OK" != true ]; then
            echo "::error title=HTTPS health check failed::${HEALTH_URL} → HTTP ${LAST_CODE} (60초 대기 후)"
            echo "  SSL 만료, Nginx, PM2 상태를 확인하세요."
            [ -f /tmp/staging-health.json ] && cat /tmp/staging-health.json || true
            exit 1
          fi

          echo "=============================================="
          echo "✅ SSL 및 HTTPS 헬스체크 통과"

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_WEB_BE }}
          TAG: ${{ github.ref_name }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "⚠️ DISCORD_WEBHOOK_URL_WEB_BE is not set — skipping notification"
            exit 0
          fi

          case "$JOB_STATUS" in
            success) STATUS_LABEL="✅ 배포 성공"; COLOR=5763719 ;;
            failure) STATUS_LABEL="❌ 배포 실패"; COLOR=15548997 ;;
            cancelled) STATUS_LABEL="⚠️ 배포 취소"; COLOR=9807270 ;;
            *) STATUS_LABEL="ℹ️ 배포 종료 ($JOB_STATUS)"; COLOR=3447003 ;;
          esac

          API_URL="https://api-staging.picakes.com"
          HEALTH_URL="${API_URL}/health"

          if [ "$JOB_STATUS" = "failure" ]; then
            PAYLOAD=$(jq -n \
              --arg title "$STATUS_LABEL — backend (staging)" \
              --argjson color "$COLOR" \
              --arg tag "$TAG" \
              --arg api "$API_URL" \
              --arg health "$HEALTH_URL" \
              --arg run_url "$RUN_URL" \
              '{
                embeds: [{
                  title: $title,
                  color: $color,
                  fields: [
                    { name: "태그", value: ("`" + $tag + "`"), inline: false },
                    { name: "API", value: ("[" + $api + "](" + $api + ")"), inline: true },
                    { name: "헬스체크", value: ("[" + $health + "](" + $health + ")"), inline: true },
                    { name: "GitHub Actions", value: ("[워크플로우 로그](" + $run_url + ")"), inline: false },
                    { name: "안내", value: "상세 로그는 GitHub Actions를 확인하세요. EC2 SSH 접속 후 `pm2 logs picake-backend-staging --lines 50` 로 서버 로그를 볼 수 있습니다.", inline: false }
                  ],
                  timestamp: (now | strftime("%Y-%m-%dT%H:%M:%SZ"))
                }]
              }')
          else
            PAYLOAD=$(jq -n \
              --arg title "$STATUS_LABEL — backend (staging)" \
              --argjson color "$COLOR" \
              --arg tag "$TAG" \
              --arg api "$API_URL" \
              --arg health "$HEALTH_URL" \
              --arg run_url "$RUN_URL" \
              '{
                embeds: [{
                  title: $title,
                  color: $color,
                  fields: [
                    { name: "태그", value: ("`" + $tag + "`"), inline: false },
                    { name: "API", value: ("[" + $api + "](" + $api + ")"), inline: true },
                    { name: "헬스체크", value: ("[" + $health + "](" + $health + ")"), inline: true },
                    { name: "GitHub Actions", value: ("[워크플로우 로그](" + $run_url + ")"), inline: false }
                  ],
                  timestamp: (now | strftime("%Y-%m-%dT%H:%M:%SZ"))
                }]
              }')
          fi

          HTTP_STATUS=$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Discord notification sent (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Discord notification failed (HTTP $HTTP_STATUS) — deploy result is unchanged"
            cat /tmp/discord_response.txt
          fi
